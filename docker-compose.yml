services:
  backend:
    build: 
      context: ./backend

    container_name: byword_backend

    restart: unless-stopped

    env_file:
      - .env
    
    working_dir: /app

    # ports:
    #   - "8000:8000"
    expose:
      - "8000"

    # volumes:
    #   - ./backen:/app
    volumes:
      - ${PWD}/backend:/app

    command: >
      sh -c "
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "

  nginx:

    image: nginx:latest

    container_name: byword_nginx

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "8000:80"

    volumes:
      - ${PWD}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf

      - ${PWD}/backend/media:/app/media

      - ${PWD}/backend/staticfiles:/app/staticfiles

  frontend:
    build:
      context: ./frontend

    container_name: byword_frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend
