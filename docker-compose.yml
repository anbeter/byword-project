services:
  backend:
    build: 
      context: ./backend

    container_name: byword_backend

    restart: unless-stopped

    env_file:
      - .env
    
    working_dir: /app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      sh -c "
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./frontend

    container_name: byword_frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend
